<!DOCTYPE html>
<html>
<head>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  .container {
    width: 90%;
    max-width: 400px;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }

  pre {
    margin-top: 15px;
    text-align: left;
    white-space: pre-wrap;
  }
</style>
  <title>Current Courier- Delivery Calculator</title>
</head>
<body>

<h2>Current Courier- Delivery Calculator </h2>

<input id="driver" placeholder="Driver location"><br><br>
<input id="pickup" placeholder="Pickup location"><br><br>
<input id="dropoff" placeholder="Dropoff location"><br><br>

<label>
<input type="checkbox" id="hourlyRate">
  Apply $26 per hour rate?
</label>
<br></br>
  
<button onclick="run()">Calculate</button>

<pre id="output"></pre>

<script src="app.js"></script>
</body>
</html>
