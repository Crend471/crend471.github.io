<!DOCTYPE html>
<html>
<head>
<title>Current Courier - Delivery Calculator</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:rgb(24,57,33);
    color:white;
    font-family:Monospace,sans-serif;

    display:flex;
    justify-content:flex-start; 
    align-items:flex-end;        
    position: relative;
    padding:20px; 
    padding-bottom:60px;
}

.wrapper{
    width:95%;
    max-width:1200px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    display:flex;
    gap:30px;
}

.left-box,
.right-box{
    border:2px solid black;
    border-radius:12px;
    padding:20px;
    background:rgb(24,57,33);
    box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.left-box{
    width:350px;
}

.right-box{
    flex:1;
}

input,
button{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    border:none;
    background:#007bff;
    color:white;
    cursor:pointer;
}

pre{
    white-space:pre-wrap;
    font-size:18px;
}

/* Mobile */
@media(max-width:800px){

.container{
    flex-direction:column;
    gap:20px;
}

.left-box,
.right-box{
    width:100%;
    padding:25px;   
}

h1{
    font-size:28px;
}

input,
button{
    font-size:18px;   
    padding:14px;     
}

pre{
    font-size:20px;  
}
.top-left-title{
    position: absolute;
    top: 20px;
    left: 20px;
    text-align: left;
}

.title{
    font-size: 28px;
    font-weight: bold;
}

.subtitle{
    font-size: 14px;
    opacity: 0.8;
}

}
</style>
</head>

<body>
<div class="top-left-title">
    <div class="title">Current Courier</div>
    <div class="subtitle">Current Courier’s Load Pricing Calculator</div>
</div>
    
<div class="wrapper">

<h1>Current Courier - Delivery Calculator</h1>

<div class="container">

    <div class="left-box">

        <input id="driver" placeholder="Driver location">

        <input id="pickup" placeholder="Pickup location">

        <input id="dropoff" placeholder="Dropoff location">

        <label>
            <input type="checkbox" id="hourlyRate">
            Apply $26 per hour rate?
        </label>

        <br><br>

        <button onclick="run()">Calculate</button>

    </div>

    <div class="right-box">

        <h2>Results</h2>

        <pre id="output"></pre>

    </div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
