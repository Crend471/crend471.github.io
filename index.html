<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center; 
    align-items: center;      
    color: white;
    font-family: Monospace, sans-serif;
    background: rgb(24,57,33);
  }

  .container {
    width: 90%;
    max-width: 400px;

    display: flex;
    flex-direction: column;

    gap: 10px;
    border: 2px solid black;
    padding: 20px;
    background: rgb(24,57,33);
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
  }

  input, button {
    width: 97%;
    padding: 10px;
    border-radius: 5px;
  }

  input {
    border: 1px solid #ccc;
  }

  button {
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
  }

  pre {
    text-align: left;
    white-space: pre-wrap;
  }
</style>
  <title>Current Courier- Delivery Calculator</title>
</head>
<body background: rgb(24,57,33)>
<div class="container">
<h2>Current Courier- Delivery Calculator </h2>

<input id="driver" placeholder="Driver location"><br><br>
<input id="pickup" placeholder="Pickup location"><br><br>
<input id="dropoff" placeholder="Dropoff location"><br><br>

<label>
<input type="checkbox" id="hourlyRate">
  Apply $26 per hour rate?
</label>
<br></br>
  
<button onclick="run()">Calculate</button>

<pre id="output"></pre>

<script src="app.js"></script>
</body>
</html>
